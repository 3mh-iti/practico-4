<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario - MusicStore</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <main id="contenedor-principal">
        <header id="encabezado">
            <h1 id="logo">MusicStore</h1>
            <small id="subtitulo">Gestión de Inventario</small>
        </header>

        <article id="contenido">
            <section id="seccion-listado">
                <h2 class="titulo-seccion">Artículos Disponibles</h2>
                <ul id="listado">
                    <!-- El listado se genera desde JavaScript -->
                </ul>
            </section>

            <section id="seccion-formulario">
                <h2 class="titulo-seccion">Ingresar Nuevo Artículo</h2>
                <form id="formulario-producto">
                    <input type="text" id="nombre" placeholder="Nombre del artículo" required>
                    <input type="number" id="precio" placeholder="Precio sugerido" required>
                    <button type="submit">Guardar Artículo</button>
                </form>
            </section>
        </article>

        <footer id="pie-pagina">
            <div>&copy; 2026 MusicStore - Sistema Interno</div>
        </footer>
    </main>
    <script src="script.js"></script>
</body>
</html>
