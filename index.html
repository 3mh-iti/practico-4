<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario - MusicStore</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
 <header>
    <h1>Music Store</h1>
    <p>Gestión de inventario</p>
 </header>
 <main>
    <section id="seccion-listado">
        <h2 class="titulo-seccion">Artículos en inventario</h2>
        <div id="listado"></div>
    </section>

    <h2>Ingresar nuevo articulo</h2>
                <input type="hidden">
                <form id="formulario-producto">
                    <input type="text" id="nombre" placeholder="Nombre del artículo" required>
                    <input type="number" id="precio" placeholder="Precio sugerido" required>
                    <button type="submit" id="guardar">Guardar Artículo</button>
                </form>
            </main>
    
        <footer>
            <section><p>© 2026 MusicStore - sistema interno</p></section>
        </footer>
    <script src="script.js"></script>
</body>
</html>
