<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventario - MusicStore</title>
    <link rel="stylesheet" href="estilos.css" />
  </head>
  <body>
    <main id="contenedor-principal">
      <header id="encabezado">
        <h1 id="logo">MusicStore</h1>
        <h2 id="subtitulo">Gestión de Inventario</h2>
        <input
          type="search"
          name="Buscador"
          id="buscador"
          placeholder="Buscar artículo"
        />
      </header>

      <section id="contenido">
        <section id="seccion-listado">
          <h3 class="titulo-seccion">Artículos Disponibles</h3>
          <section id="listado">
            <!-- El listado se genera desde JavaScript -->
          </section>
        </section>

        <section id="seccion-formulario">
          <h3 class="titulo-seccion">Ingresar Nuevo Artículo</h3>
          <form id="formulario-producto">
            <input
              type="text"
              id="nombre"
              placeholder="Nombre del artículo"
              required
            />
            <input
              type="number"
              id="precio"
              placeholder="Precio sugerido"
              required
            />
            <button type="submit">Guardar Artículo</button>
          </form>
        </section>
      </section>
      <dialog id="dialogo-confirmacion">
        <p id="mensaje">¿Confirma que desea eliminar este artículo?</p>
        <div class="botones-dialogo">
          <button id="confirmar-eliminar">Sí, eliminar</button>
          <button id="cancelar-eliminar">No, cancelar</button>
        </div>
      </dialog>

      <footer id="pie-pagina">
        <p>&copy; 2026 MusicStore - Sistema Interno &reg; &trade;</p>
      </footer>
    </main>
    <script src="script.js"></script>
  </body>
</html>
