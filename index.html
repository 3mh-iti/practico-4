<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario - MusicStore</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
        <header id="encabezado">
            <div id="logo">MusicStore</div>
            <h2 id="subtitulo">Gestión de Inventario</h2>
        </header>

        <main id="contenido">
            <section id="seccion-listado">
                <h3 class="titulo-seccion">Artículos Disponibles</h3>
                <ul id="listado">
                    <!-- El listado se genera desde JavaScript -->
                </ul>
            </section>

            <section id="seccion-formulario">
                <h3 class="titulo-seccion">Ingresar Nuevo Artículo</h3>
                <form id="formulario-producto">
                    <input type="text" id="nombre" placeholder="Nombre del artículo" required>
                    <input type="number" id="precio" placeholder="Precio sugerido" required>
                    <button type="submit">Guardar Artículo</button>
                </form>
            </section>

            <footer id="pie-pagina">
            <i>&copy; 2026 MusicStore - Sistema Interno</i>
             </footer>
        </main>
    <script src="script.js"></script>
</body>
</html>
